server {
    listen 80;
    server_name tradeflow.example.com; # 替换为您的域名或 IP

    root /var/www/tradeflow/dist;      # 替换为您的 Vite 静态编译产物 dist 目录路径
    index index.html;

    # 安全响应头
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # 开启 Gzip 压缩，减少前端静态资源传输体积
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    # 静态资源强缓存 (JS, CSS, 打包后的图片/字体等)
    # Vite 编译输出的文件名自带 Content-Hash (如 index-BYF6aUnb.js)
    # 因此可以配置极长的强缓存，一旦代码更新哈希改变会自动重新拉取
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # SPA 路由兜底逻辑
    # 确保刷新浏览器等非根页面路由（如 /journal 等）时，由 index.html 在前端进行路由接管
    location / {
        try_files $uri $uri/ /index.html;
    }
}
